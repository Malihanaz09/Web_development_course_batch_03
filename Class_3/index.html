<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 3</title>
</head>
<body>
    <!-- form tag -->
     <form action="./userdata.html">
        <label for="username">Name: </label>
        <input type="text" placeholder="enter your name" name="username" required maxlength="20" minlength="4"><br>
        <label for="useremail">Email: </label>
        <input type="email" placeholder="enter your email" name="useremail"><br>
        <label for="userpassword">Password: </label>
        <input type="password" placeholder="enter your password" name="userpassword"><br>
       <!-- CheckBox -->
        <p>Choose your language</p>
        <input type="checkbox" name="language" value="HTML">
        <label for="html">HTML</label>
        <input type="checkbox" name="language" value="CSS">
        <label for="CSS">CSS</label>
        <input type="checkbox" name="language" value="JavaScript">
        <label for="JavaScript">JavaScript</label>
        <!-- Radio -->
         <p>Choose your language</p>
        <input type="radio" name="language" value="HTML">
        <label for="html">HTML</label>
        <input type="radio" name="language" value="CSS">
        <label for="CSS">CSS</label>
        <input type="radio" name="language" value="JavaScript">
        <label for="JavaScript">JavaScript</label><br>
        <!-- textarea -->
         <label for="">Enter your feedback: </label>
         <textarea name="feedback" id=""></textarea><br>
         <!-- select tag -->
          <label for="">City Names: </label>
          <select name="city" id="city">
            <option value="Karachi">Karachi</option>
            <option value="Lahore">Lahore</option>
            <option value="Islamabad">Islamabad</option>
            <option value="Multan">Multan</option>
          </select>
        <br><input type="submit">
     </form>

     <!-- video tag -->
      <video src="./video/Untitled - Google Chrome 2025-02-23 02-46-52.mp4" width="600px" controls autoplay loop></video>

      <!-- iframe tag -->
       <iframe width="560" height="315" src="https://www.youtube.com/embed/-4e3ewcTupM?si=Nui0bjXu9XC7RYAp" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
       <!-- Audio Tag -->
       <audio src="./behtreen_dost.mp3" controls></audio>
    </body>
</html>
